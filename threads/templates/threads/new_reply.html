{% extends "threads/base.html" %}
{% block content %}
<p>Reply to: {{comment.text|truncatechars:50}} by {{comment.owner}}</p>
<form action="{% url 'threads:new_reply' topic.id thread.id comment.id%}" method="post">
{% csrf_token %}
{{form.as_div}}
<button class="btn btn-primary mt-3" name="submit">Submit</button>
</form>
{% endblock content %}
