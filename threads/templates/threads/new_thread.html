{% extends "threads/base.html" %}
{% block content %}
<p class="lead fw-bold">Create a new Thread for {{topic.topic_name}}</p>
<form action="{% url 'threads:new_thread' topic.id%}" method="post">
{% csrf_token %}
<div class="mb-3">
    {{form.as_div}}
</div>
<button class="btn btn-primary" name="submit">Submit</button>
</form>
{% endblock content %}
